<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEDPRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --led-color: #00ff00;
            --led-size: 4px;
            --led-spacing: 6px;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none; 
            user-select: none; /* Impede seleção de texto acidental */
        }

        /* --- UI Elements --- */
        .glass-panel {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            position: relative; 
            z-index: 20; /* Garante que o painel esteja acima do fundo */
        }

        input[type="text"], input[type="range"], select {
            accent-color: var(--led-color);
        }

        .custom-input {
            background: #111;
            border: 1px solid #333;
            color: var(--led-color);
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .custom-input:focus {
            outline: none;
            border-color: var(--led-color);
            box-shadow: 0 0 10px var(--led-color);
        }

        /* --- O Display de LED --- */
        #display-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 50;
            display: flex;
            align-items: center;
            opacity: 0;
            pointer-events: none; /* ESSENCIAL: Impede cliques quando invisível */
            transition: opacity 0.5s ease;
            overflow: hidden;
            transform-origin: top left;
        }

        #display-container.active {
            opacity: 1;
            pointer-events: auto; /* Reativa cliques quando visível */
        }

        /* Rotação Robusta */
        .rotate-screen {
            width: 100vh !important;
            height: 100vw !important;
            transform: rotate(90deg) translateY(-100%);
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            margin: 0 !important;
        }

        /* Texto Rolante */
        .marquee-wrapper {
            white-space: nowrap;
            will-change: transform;
            position: absolute;
            left: 0;
        }

        .led-text {
            font-family: 'Share Tech Mono', monospace;
            line-height: 1;
            font-weight: bold;
            color: var(--led-color);
            text-transform: uppercase;
            text-shadow: 
                0 0 5px var(--led-color),
                0 0 10px var(--led-color),
                0 0 20px var(--led-color);
            /* Adiciona padding lateral para evitar corte na primeira/última letra */
            padding-inline: 50px; 
        }

        /* Overlay de Grade */
        .dot-matrix-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 60;
            pointer-events: none;
            background-image: radial-gradient(circle, transparent 35%, #000 40%);
            background-size: var(--led-spacing) var(--led-spacing); 
        }

        /* --- CORREÇÃO DO BUG DO BOTÃO (IMPORTANTE) --- */
        .close-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 70;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            
            opacity: 0;
            pointer-events: none; /* O PULO DO GATO: Ninguém clica aqui se estiver invisível */
            
            transition: opacity 0.3s;
            cursor: pointer;
            transform: none !important; 
        }
        
        .close-area.visible {
            opacity: 1;
            pointer-events: auto; /* Só clica quando estiver visível */
        }

    </style>
</head>
<body class="flex flex-col h-screen bg-neutral-900">

    <!-- SETUP SCREEN -->
    <main id="setup-panel" class="flex-1 flex flex-col justify-center items-center p-6 w-full max-w-lg mx-auto relative z-10">
        
        <div class="mb-8 text-center">
            <h1 class="text-5xl font-bold text-white mb-1 tracking-tighter" style="font-family: 'Share Tech Mono'">LED<span id="logo-color" class="text-green-500">PRO</span></h1>
            <div class="h-1 w-24 bg-green-500 mx-auto rounded-full shadow-[0_0_10px_#22c55e]"></div>
        </div>

        <div class="glass-panel w-full p-6 rounded-2xl flex flex-col gap-5">
            
            <div>
                <label class="text-xs font-bold text-gray-400 tracking-wider mb-2 block">MENSAGEM</label>
                <input type="text" id="input-text" class="custom-input w-full p-4 rounded-lg text-2xl text-center" placeholder="DIGITE AQUI" value="BEM VINDO">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 tracking-wider mb-2 block">COR DO LED</label>
                    <div class="relative h-12 w-full">
                        <input type="color" id="input-color" value="#00ff00" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="color-preview" class="w-full h-full rounded-lg border border-gray-600 bg-green-500 shadow-[0_0_15px_rgba(0,255,0,0.3)] transition-colors"></div>
                    </div>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-400 tracking-wider mb-2 block">TAMANHO</label>
                    <select id="input-size" class="w-full h-12 bg-[#111] border border-[#333] text-white rounded-lg px-2 text-sm focus:outline-none focus:border-green-500">
                        <option value="20">Pequeno</option>
                        <option value="40">Médio</option>
                        <option value="60">Grande</option>
                        <option value="80">Max</option>
                        <option value="100" selected>Max pro (Cheio)</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-xs font-bold text-gray-400 tracking-wider">VELOCIDADE</label>
                    <span id="speed-display" class="text-xs font-bold text-green-400">NORMAL</span>
                </div>
                <input type="range" id="input-speed" min="10" max="100" value="50" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="flex items-center gap-3 mt-2 bg-black/20 p-3 rounded-lg border border-white/5">
                <input type="checkbox" id="check-rotate" checked class="w-5 h-5 rounded accent-green-500">
                <label for="check-rotate" class="text-sm text-gray-300 cursor-pointer select-none leading-tight">
                    <strong>Modo Tela Cheia (Girar)</strong><br>
                    <span class="text-xs text-gray-500">Recomendado para celulares</span>
                </label>
            </div>

            <button onclick="startApp()" class="mt-4 w-full bg-gradient-to-r from-green-600 to-green-500 text-black font-black text-xl py-4 rounded-xl shadow-[0_0_25px_rgba(34,197,94,0.4)] hover:scale-[1.02] active:scale-[0.98] transition-transform uppercase tracking-widest">
                EXIBIR
            </button>
        </div>
    </main>

    <!-- LED DISPLAY AREA -->
    <div id="display-container">
        <div id="marquee" class="marquee-wrapper">
            <span id="led-text" class="led-text"></span>
        </div>
        <div class="dot-matrix-overlay"></div>
    </div>
    
    <!-- Botão Voltar -->
    <div id="close-overlay" class="close-area">
        <button onclick="stopApp()" class="bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 backdrop-blur-md border border-red-400 transform transition hover:scale-110 font-['Share_Tech_Mono'] pointer-events-auto">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            PARAR
        </button>
    </div>

    <script>
        const els = {
            inputText: document.getElementById('input-text'),
            inputColor: document.getElementById('input-color'),
            inputSize: document.getElementById('input-size'),
            inputSpeed: document.getElementById('input-speed'),
            checkRotate: document.getElementById('check-rotate'),
            colorPreview: document.getElementById('color-preview'),
            logoColor: document.getElementById('logo-color'),
            speedDisplay: document.getElementById('speed-display'),
            displayContainer: document.getElementById('display-container'),
            marquee: document.getElementById('marquee'),
            ledText: document.getElementById('led-text'),
            closeOverlay: document.getElementById('close-overlay')
        };

        let animationFrameId;
        let overlayTimer;

        // --- UI Updates ---
        els.inputColor.addEventListener('input', (e) => {
            const color = e.target.value;
            els.colorPreview.style.backgroundColor = color;
            els.colorPreview.style.boxShadow = `0 0 15px ${color}80`;
            els.logoColor.style.color = color;
            els.inputText.style.color = color;
            els.inputText.style.borderColor = color;
            els.inputText.style.boxShadow = `0 0 10px ${color}40`;
            document.documentElement.style.setProperty('--led-color', color);
        });

        els.inputSpeed.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            let label = "NORMAL";
            if(val < 25) label = "LENTO";
            else if(val > 70) label = "TURBO";
            else if(val > 90) label = "MUITO RÁPIDO";
            els.speedDisplay.innerText = label;
        });

        // --- APP ENGINE ---
        function startApp() {
            const text = els.inputText.value.trim() || "DIGITE ALGO";
            const sizeBase = parseInt(els.inputSize.value); 
            const speedVal = parseInt(els.inputSpeed.value);
            const shouldRotate = els.checkRotate.checked;

            els.ledText.innerText = text;
            
            // Configura rotação e tamanho
            if(shouldRotate) {
                els.displayContainer.classList.add('rotate-screen');
                els.ledText.style.fontSize = `${sizeBase}vw`; 
            } else {
                els.displayContainer.classList.remove('rotate-screen');
                els.ledText.style.fontSize = `${sizeBase}vh`;
            }

            els.displayContainer.classList.add('active');
            
            // Fullscreen
            try {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } catch(e) {}

            // Inicia loop
            requestAnimationFrame(() => {
                runMarquee(speedVal, shouldRotate);
            });
        }

        function runMarquee(speedValue, isRotated) {
            // Garante que pegamos a largura correta
            const textWidth = els.ledText.offsetWidth;
            const viewWidth = isRotated ? window.innerHeight : window.innerWidth;
            
            let position = viewWidth;
            
            // Ajuste fino na curva de velocidade
            const pixelsPerFrame = Math.pow(speedValue, 1.8) / 140; 

            if(animationFrameId) cancelAnimationFrame(animationFrameId);

            function step() {
                position -= pixelsPerFrame;

                // --- Correção Texto Sumindo ---
                // Agora usamos uma margem de segurança bem maior (viewWidth / 2)
                // Isso garante que ele só reinicie quando estiver REALMENTE longe da tela
                if (position < (-textWidth - (viewWidth * 0.5))) {
                    position = viewWidth; 
                }

                els.marquee.style.transform = `translateX(${position}px)`;
                animationFrameId = requestAnimationFrame(step);
            }
            step();
        }

        function stopApp() {
            els.displayContainer.classList.remove('active');
            els.closeOverlay.classList.remove('visible');
            
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            
            if (document.exitFullscreen && document.fullscreenElement) {
                document.exitFullscreen().catch(()=>{});
            }
        }

        // --- Controle de Botão ---
        function toggleOverlay(e) {
            // SEGURANÇA: Só abre o menu se o app estiver rodando!
            if (!els.displayContainer.classList.contains('active')) return;

            // Se clicou no botão PARAR, deixa o evento seguir
            if(e.target.closest('button')) return;

            els.closeOverlay.classList.add('visible');
            
            clearTimeout(overlayTimer);
            overlayTimer = setTimeout(() => {
                els.closeOverlay.classList.remove('visible');
            }, 3000);
        }

        // Listeners
        els.displayContainer.addEventListener('click', toggleOverlay);
        els.displayContainer.addEventListener('touchstart', toggleOverlay, {passive: true});
        
        // Listener no próprio overlay para manter visível se tocar
        els.closeOverlay.addEventListener('click', toggleOverlay);
        els.closeOverlay.addEventListener('touchstart', toggleOverlay, {passive: true});

    </script>
</body>
</html>
